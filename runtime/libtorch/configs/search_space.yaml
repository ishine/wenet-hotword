# Search space for the hotword-pipeline autotuner.
#
# Consumed by `tools/autotune.py`. Each entry is a `dotted.path: { ... }`
# mapping into `default.yaml`'s nested keys; the autotuner translates it into
# Optuna `trial.suggest_*` calls.
#
# Supported entry types:
#   { type: float,       low: <num>, high: <num>, step: <num?>, log: <bool?> }
#   { type: int,         low: <int>, high: <int>, step: <int?> }
#   { type: categorical, choices: [...] }
#
# Sampler is TPE multivariate (multi-objective recall↑, CER↓) — see
# autotune.sampler in default.yaml. The search space stays in the regime
# that ablations have already shown to matter; widen ranges only after a
# sweep flatlines.

space:
  # --- rescoring (the load-bearing axis) ---
  decode.rescoring_weight:
    type: float
    low: 0.3
    high: 2.5
  decode.ctc_weight:
    type: float
    low: 0.2
    high: 0.8
  decode.length_penalty:
    type: float
    low: -1.0
    high: 1.0
  decode.nbest:
    type: categorical
    choices: [5, 10, 20]

  # --- hotword pathway ---
  hotword.fuzzy_threshold:
    type: float
    low: 0.2
    high: 0.7
  # Capped at 20 because each appended path runs through the transformer
  # rescorer; 40 was kept earlier for offline ablations but pushes inference
  # latency past budget.
  hotword.max_append_path:
    type: categorical
    choices: [10, 20]
  # --- newly exposed knobs (were hardcoded in C++) ---
  # Edit-distance rejection ratio in fuzzy_substring_search_*. Lower = stricter.
  hotword.fuzzy_reject_ratio:
    type: float
    low: 0.5
    high: 0.95
  # Confidence-weight lower bound in weighted edit distance. Higher = less
  # discount for low-confidence tokens (more conservative).
  hotword.confidence_weight_min:
    type: float
    low: 0.1
    high: 0.5
  # Linear scaling factor for hotword length bonus (replaces log2).
  # 0.3 ≈ short words favoured; 0.8 ≈ long words favoured.
  # Previous hardcoded behaviour was log2 ≈ 0.5 for 2-char words.
  hotword.bonus_length_scale:
    type: float
    low: 0.2
    high: 0.8
  # CalculateMatchBonus master multiplier. 0.5 ≈ "barely bias", 4.0 ≈
  # "FP explosion likely". The previous hardcoded value was 2.0.
  hotword.bonus_weight:
    type: float
    low: 0.5
    high: 4.0
  # FastRAG neighbor-distance cutoff. Phoneme distance lives in [0,1];
  # 0.3 keeps only strict neighbors, 0.7 lets fairly fuzzy ones through.
  # Previous hardcoded value was 0.5.
  hotword.neighbor_threshold:
    type: float
    low: 0.3
    high: 0.7
  # Lower bound on the avg_confidence divisor; physical range is [0,1].
  # Previous hardcoded value was 0.4.
  hotword.confidence_floor:
    type: float
    low: 0.2
    high: 0.8
