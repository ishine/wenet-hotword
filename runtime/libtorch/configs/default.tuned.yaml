name: default.tuned
paths:
  decoder_bin: runtime/libtorch/build/bin/decoder_main
  model_dir: ~/userspace/wenet/models/u2pp_conformer-asr-cn-16k-online
  testset_dir: ~/userspace/wenet/aishell_test
  eval_testset_dir: ~/userspace/wenet/aishell1_indep_hotword
  pinyin_dict_dir: runtime/libtorch/build/bin/dict
  out_dir: runtime/libtorch/eval_runs
decode:
  chunk_size: -1
  num_left_chunks: -1
  ctc_weight: 0.7290412171129117
  rescoring_weight: 0.37779735866208003
  reverse_weight: 0.34626579503888294
  nbest: 10
  beam: 16.0
  lattice_beam: 10.0
  acoustic_scale: 1.0
  blank_skip_thresh: 1.0
  length_penalty: 0.07235498940690399
  max_active: 7000
  min_active: 200
hotword:
  hotword_path: hotwords.txt
  fuzzy_threshold: 0.4570702706188377
  fuzzy_threshold_en: 0.5
  max_append_path: 10
  use_confidence_reward: true
  context_score: 3.0
  enable_hotword_cache: true
runtime:
  thread_num: 0
  warmup: 0
  simulate_streaming: false
autotune:
  n_trials: 100
  sampler: nsga2
  random_seed: 0
  cer_baseline: 14.2
  study_name: default
  study_db: runtime/libtorch/configs/default.study.db
  tuned_config_out: runtime/libtorch/configs/default.tuned.yaml
  pareto_out: runtime/libtorch/configs/default.pareto.jsonl
  eval_metrics_out: runtime/libtorch/configs/default.eval.txt
